default_permissions = "workspace"

[permissions.workspace.filesystem]
":minimal" = "read"
glob_scan_max_depth = 4

[permissions.workspace.filesystem.":workspace_roots"]
"." = "write"
".env" = "none"
".env.*" = "none"
".dev.vars" = "none"
".dev.vars.*" = "none"
"*/.env" = "none"
"*/.env.*" = "none"
"*/.dev.vars" = "none"
"*/.dev.vars.*" = "none"
"**/.env" = "none"
"**/.env.*" = "none"
"**/.dev.vars" = "none"
"**/.dev.vars.*" = "none"
