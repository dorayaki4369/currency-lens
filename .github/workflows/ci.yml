name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  API_ENDPOINT: ${{ vars.API_ENDPOINT }}
  NODE_VERSION: "24"
  PNPM_VERSION: "11.13.0"

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Require develop as the source of main pull requests
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          if [[ "$HEAD_BRANCH" != "develop" || "$HEAD_REPOSITORY" != "$GITHUB_REPOSITORY" ]]; then
            echo "::error title=Invalid promotion source::Pull requests into main must come from this repository's develop branch."
            exit 1
          fi

      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Reject environment files
        run: |
          blocked_path="$(find . -path './.git' -prune -o \( -name '.env' -o -name '.env.*' -o -name '.dev.vars' -o -name '.dev.vars.*' \) -print -quit)"
          if [[ -n "$blocked_path" ]]; then
            echo "::error title=Environment file in checkout::$blocked_path must not be present in the repository."
            exit 1
          fi

      - name: Require the API endpoint
        run: |
          if [[ -z "$API_ENDPOINT" ]]; then
            echo "::error title=Missing API endpoint::Configure the repository Actions variable API_ENDPOINT."
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
