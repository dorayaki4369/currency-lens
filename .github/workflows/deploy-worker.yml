name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: worker-production
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.13.0"

jobs:
  verify:
    name: pre-deploy quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      API_ENDPOINT: ${{ vars.API_ENDPOINT }}
    steps:
      - name: Require the main branch
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error title=Invalid deployment ref::Production can only be deployed from main."
            exit 1
          fi

      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Reject environment files
        run: |
          blocked_path="$(find . -path './.git' -prune -o \( -name '.env' -o -name '.env.*' -o -name '.dev.vars' -o -name '.dev.vars.*' \) -print -quit)"
          if [[ -n "$blocked_path" ]]; then
            echo "::error title=Environment file in checkout::$blocked_path must not be present in the repository."
            exit 1
          fi

      - name: Require the API endpoint
        run: |
          if [[ -z "$API_ENDPOINT" ]]; then
            echo "::error title=Missing API endpoint::Configure the repository Actions variable API_ENDPOINT."
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy:
    name: deploy production
    if: github.repository == 'dorayaki4369/currency-lens'
    needs:
      - verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ vars.API_ENDPOINT }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Reject environment files
        run: |
          blocked_path="$(find . -path './.git' -prune -o \( -name '.env' -o -name '.env.*' -o -name '.dev.vars' -o -name '.dev.vars.*' \) -print -quit)"
          if [[ -n "$blocked_path" ]]; then
            echo "::error title=Environment file in checkout::$blocked_path must not be present in the repository."
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy the Worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [[ -z "$CLOUDFLARE_ACCOUNT_ID" || -z "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "::error title=Missing Cloudflare credentials::Configure the production environment secrets."
            exit 1
          fi

          pnpm --filter @cl/server deploy
